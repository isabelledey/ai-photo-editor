<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Image Editor</title>

    <!-- TailwindCSS via CDN for rapid, utility-based styling. -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
      <!-- Hero / intro section with upload form. -->
      <section class="rounded-2xl bg-white p-6 shadow-sm sm:p-8">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-indigo-600">
          FastAPI + Tailwind Starter
        </p>
        <h1 class="mt-2 text-3xl font-bold sm:text-4xl">AI Image Editor</h1>
        <p class="mt-3 max-w-2xl text-slate-600">
          Upload an image to preview it as the original input. The edited output panel is ready for future AI processing.
        </p>

        <form id="uploadForm" class="mt-6 space-y-4">
          <!-- Styled file input (drag-and-drop style card). -->
          <label
            for="imageInput"
            class="group block cursor-pointer rounded-xl border-2 border-dashed border-slate-300 bg-slate-50 p-8 text-center transition hover:border-indigo-400 hover:bg-indigo-50"
          >
            <div class="space-y-2">
              <p class="text-base font-semibold text-slate-800">Drop an image here or click to browse</p>
              <p class="text-sm text-slate-500">PNG, JPG, WEBP and more</p>
            </div>
            <input id="imageInput" name="file" type="file" accept="image/*" class="sr-only" required />
          </label>

          <div class="flex flex-wrap items-center gap-3">
            <button
              id="uploadBtn"
              type="submit"
              class="rounded-lg bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-60"
            >
              Upload Image
            </button>
            <p id="statusText" class="text-sm text-slate-500">Choose an image to start.</p>
          </div>
        </form>
      </section>

      <!-- Side-by-side preview area. -->
      <section class="mt-8 grid gap-6 lg:grid-cols-2">
        <article class="rounded-2xl bg-white p-5 shadow-sm">
          <h2 class="mb-4 text-lg font-semibold">Original Image</h2>
          <div class="flex h-80 items-center justify-center overflow-hidden rounded-xl border border-slate-200 bg-slate-50">
            <!-- Hidden until upload succeeds. -->
            <img id="originalPreview" alt="Original upload preview" class="hidden h-full w-full object-contain" />
            <p id="originalPlaceholder" class="px-4 text-center text-sm text-slate-500">
              Uploaded image will appear here.
            </p>
          </div>
        </article>

        <article class="rounded-2xl bg-white p-5 shadow-sm">
          <h2 class="mb-4 text-lg font-semibold">Edited Image</h2>
          <div class="flex h-80 items-center justify-center rounded-xl border border-slate-200 bg-slate-50">
            <p class="px-4 text-center text-sm text-slate-500">
              AI-edited result will appear here in a later step.
            </p>
          </div>
        </article>
      </section>
    </main>

    <script>
      // Grab DOM elements once for reuse.
      const form = document.getElementById("uploadForm");
      const imageInput = document.getElementById("imageInput");
      const uploadBtn = document.getElementById("uploadBtn");
      const statusText = document.getElementById("statusText");
      const originalPreview = document.getElementById("originalPreview");
      const originalPlaceholder = document.getElementById("originalPlaceholder");

      // Submit upload asynchronously to the FastAPI endpoint.
      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!imageInput.files || !imageInput.files[0]) {
          statusText.textContent = "Please select an image file first.";
          return;
        }

        const formData = new FormData();
        formData.append("file", imageInput.files[0]);

        // Loading state: prevent duplicate uploads and inform the user.
        uploadBtn.disabled = true;
        uploadBtn.textContent = "Uploading...";
        statusText.textContent = "Uploading image, please wait...";

        try {
          const response = await fetch("/api/upload", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (!response.ok || !data.success) {
            throw new Error(data.detail || "Upload failed.");
          }

          // Show uploaded image in Original Image panel.
          originalPreview.src = data.file_url;
          originalPreview.classList.remove("hidden");
          originalPlaceholder.classList.add("hidden");

          statusText.textContent = "Upload successful.";
        } catch (error) {
          statusText.textContent = error.message || "Something went wrong during upload.";
        } finally {
          uploadBtn.disabled = false;
          uploadBtn.textContent = "Upload Image";
        }
      });
    </script>
  </body>
</html>
